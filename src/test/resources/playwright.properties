# Playwright / Allure integration
#
# Toggle screenshot attachment after each @Step.
# Can be overridden via:
# - JVM:  -DALLURE_STEP_SCREENSHOTS=true
# - Env:  ALLURE_STEP_SCREENSHOTS=true
allure.step.screenshots=false

# Full-page screenshots are heavier; keep off by default.
allure.step.screenshots.fullPage=false

