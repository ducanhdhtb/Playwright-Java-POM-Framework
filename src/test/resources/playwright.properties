# =========================
# Playwright Configuration
# =========================

# Browser engine: chromium | firefox | webkit
playwright.browser=chromium

# Optional browser channel for Chromium (examples: chrome, msedge).
# Leave blank to use Playwright-managed browser.
playwright.channel=

# Headless + slow motion (ms)
playwright.headless=true
playwright.slowMoMs=0

# Default timeouts (ms)
playwright.defaultTimeoutMs=30000
playwright.navigationTimeoutMs=30000
playwright.assertionTimeoutMs=5000

# Optional viewport. Set both to 0 to use Playwright defaults.
playwright.viewport.width=0
playwright.viewport.height=0

# Optional context settings
playwright.locale=
playwright.timezoneId=
playwright.ignoreHttpsErrors=false

# Artifacts root (relative path)
playwright.artifactsDir=target/artifacts

# Tracing: off | on | retain-on-failure
playwright.tracing=retain-on-failure
playwright.tracing.screenshots=true
playwright.tracing.snapshots=true
playwright.tracing.sources=true
playwright.tracing.dir=traces

# Video recording: off | on | retain-on-failure
playwright.video=retain-on-failure
playwright.video.dir=target/videos
playwright.video.width=0
playwright.video.height=0

# =========================
# Allure Integration
# =========================

# Toggle screenshot attachment after each @Step.
# Can be overridden via:
# - JVM:  -DALLURE_STEP_SCREENSHOTS=true
# - Env:  ALLURE_STEP_SCREENSHOTS=true
allure.step.screenshots=false

# Full-page screenshots are heavier; keep off by default.
allure.step.screenshots.fullPage=false
