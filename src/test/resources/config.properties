# Configuration for the Automation Framework

# Base URL for the application under test
baseUrl=https://automationexercise.com/

# API base URL (defaults to baseUrl if not set)
api.baseUrl=https://automationexercise.com

# Default test password (used by helpers that need to create users)
test.defaultPassword=Password123

# Retry settings (TestNG RetryAnalyzer)
# retryCount = how many retries after the first failure (0 disables retry)
retryCount=1
# Only retry Playwright timeouts by default (avoid masking real assertion failures)
retry.onlyTimeouts=true
